name: Render Simulation Report

on:
  push:
    branches: [main]
    paths:
      - 'reports/qmd/simulation_report.qmd'
      - 'scripts/utils/load_results.R'
      - 'data/csv/**'
      - '.github/workflows/render-report.yml'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-${{ runner.os }}-${{ hashFiles('.github/r-packages.txt') }}
          restore-keys: r-${{ runner.os }}-

      - name: Install R packages
        run: |
          install.packages(c(
            "tidyverse", "knitr", "kableExtra",
            "lme4", "lmerTest", "emmeans",
            "patchwork", "scales"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render QMD
        run: |
          quarto render reports/qmd/simulation_report.qmd
          mkdir -p _site
          cp reports/qmd/simulation_report.html _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
